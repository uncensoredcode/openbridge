name: Prepublish LLM Smoke

on:
  workflow_call:
    inputs:
      models:
        description: Optional comma-separated labels to test
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      models:
        description: Optional comma-separated labels to test
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  NODE_VERSION: 24
  OPENCODE_VERSION: 1.4.3

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.normalize.outputs.matrix }}

    steps:
      - name: Normalize model filter
        id: normalize
        env:
          RAW_MODELS: ${{ inputs.models }}
        run: |
          FILTERED_MATRIX=$(node <<'NODE'
          const requested = (process.env.RAW_MODELS || "")
            .toLowerCase()
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);
          const include = [
            {
              label: "qwen",
              provider_id: "chat-qwen-ai",
              model_id: "qwen3.6-plus",
              session_secret: "QWEN_SESSION"
            },
            {
              label: "deepseek",
              provider_id: "chat-deepseek-com",
              model_id: "deepseek-chat",
              session_secret: "DEEPSEEK_SESSION"
            },
            {
              label: "kimi",
              provider_id: "kimi",
              model_id: "kimi-k2@instant",
              session_secret: "KIMI_SESSION"
            },
            {
              label: "zai",
              provider_id: "zai",
              model_id: "glm-4.7",
              session_secret: "ZAI_SESSION"
            }
          ];
          const filtered = requested.length === 0
            ? include
            : include.filter((entry) => requested.includes(entry.label));
          if (filtered.length === 0) {
            console.error(
              `No smoke-test labels matched input: ${process.env.RAW_MODELS || "(empty)"}`
            );
            process.exit(1);
          }
          process.stdout.write(JSON.stringify({ include: filtered }));
          NODE
          )
          echo "matrix=$FILTERED_MATRIX" >>"$GITHUB_OUTPUT"

  smoke:
    needs:
      - prepare
    name: smoke / ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenCode
        run: npm install --global opencode-ai@${OPENCODE_VERSION}

      - name: Build package
        run: bun run build

      - name: Refresh workspace package links
        run: bun install --frozen-lockfile

      - name: Run OpenCode smoke
        env:
          BRIDGE_PROVIDER_ID: ${{ matrix.provider_id }}
          BRIDGE_MODEL_ID: ${{ matrix.model_id }}
          BRIDGE_SESSION_JSON: ${{ secrets[matrix.session_secret] }}
          SESSION_SECRET_NAME: ${{ matrix.session_secret }}
        run: bash .github/scripts/run-prepublish-llm-smoke.sh
