name: Prepublish LLM Smoke

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  NODE_VERSION: 24
  OPENCODE_VERSION: 1.4.3

jobs:
  smoke:
    name: smoke / ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: qwen
            provider_id: chat-qwen-ai
            model_id: qwen3.6-plus
            session_secret: QWEN_SESSION

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install OpenCode
        run: npm install --global opencode-ai@${OPENCODE_VERSION}

      - name: Build package
        run: bun run build

      - name: Refresh workspace package links
        run: bun install --frozen-lockfile

      - name: Run OpenCode smoke
        env:
          BRIDGE_PROVIDER_ID: ${{ matrix.provider_id }}
          BRIDGE_MODEL_ID: ${{ matrix.model_id }}
          BRIDGE_SESSION_JSON: ${{ secrets[matrix.session_secret] }}
          SESSION_SECRET_NAME: ${{ matrix.session_secret }}
        run: bash .github/scripts/run-prepublish-llm-smoke.sh
